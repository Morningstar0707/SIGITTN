# /etc/nginx/sites-available/sigittn-nas
#
# SIGITTN NAS — Servidor de archivos estáticos + proxy de subida
# Activar con:
#   sudo ln -s /etc/nginx/sites-available/sigittn-nas /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Límite de subida (debe ser >= al límite de multer en server.js)
client_max_body_size 55M;

# Rate limit para el endpoint de subida (seguridad extra)
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

server {
    listen 8080;
    server_name _;

    # ── Archivos estáticos (imágenes y videos del chat) ──────────────
    # Acceso público de solo lectura — nginx los sirve directamente.
    location ~* \.(jpe?g|png|gif|webp|mp4|webm|mov)$ {
        root  /srv/nas/sigittn;

        # Solo GET/HEAD — bloquear cualquier otro método
        limit_except GET HEAD { deny all; }

        # Caché agresivo: los archivos son inmutables una vez subidos
        expires 1y;
        add_header Cache-Control "public, immutable";

        # CORS: el navegador (Vercel) puede cargar las imágenes/videos
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";

        # Si el archivo no existe → 404 limpio
        try_files $uri =404;
    }

    # ── Proxy al API de subida (Node.js en localhost:9090) ───────────
    location /upload {
        # Rate limiting: máx 10 subidas por minuto por IP
        limit_req zone=upload burst=5 nodelay;

        proxy_pass         http://127.0.0.1:9090/upload;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Salud ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:9090/health;
    }

    # ── Bloquear acceso a archivos ocultos y directorios ─────────────
    location ~ /\. {
        deny all;
    }

    # Desactivar listado de directorios
    autoindex off;
}
