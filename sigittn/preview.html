<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1526" />
  <title>SIGITTN - El Terminal Neiva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1526;
      --card-dark: #0f1e33;
      --card-light: #f7f9fc;
      --blue: #1565C0;
      --orange: #E67E22;
      --green: #27AE60;
      --teal: #0D47A1;
      --text-dark: #e8edf5;
      --text-muted: #8fa3be;
      --text-light: #0f1e33;
      --text-light-muted: #6b7f97;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background orbs */
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    .orb1 { width: 550px; height: 550px; background: radial-gradient(circle, rgba(30,111,197,.13) 0%, transparent 70%); top: -130px; right: -90px; }
    .orb2 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(232,124,43,.09) 0%, transparent 70%); bottom: -110px; left: -70px; }
    .orb3 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(39,174,96,.07) 0%, transparent 70%); top: 50%; left: 35%; transform: translateY(-50%); }

    /* Card */
    .card {
      display: flex;
      width: min(780px, calc(100vw - 32px));
      min-height: 460px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,.55), 0 8px 30px rgba(0,0,0,.35);
      position: relative;
      z-index: 1;
      animation: cardIn .65s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* Left panel */
    .left {
      flex: 1;
      background: var(--card-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      gap: 24px;
      animation: fadeUp .7s .15s cubic-bezier(.22,1,.36,1) both;
    }

    .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }


    

    .welcome { text-align: center; }
    .welcome h2 { font-family: 'Outfit', sans-serif; font-size: 17px; font-weight: 700; color: var(--text-light); margin-bottom: 6px; }
    .welcome p  { font-size: 12px; color: var(--text-light-muted); line-height: 1.5; max-width: 195px; }

    .dots { display: flex; gap: 6px; }
    .dot  { width: 6px; height: 6px; border-radius: 50%; background: #d0dae6; }
    .dot:nth-child(2) { background: #b0bfd0; }
    .dot:nth-child(3) { background: #90a5bc; }

    /* Divider */
    .divider { width: 1px; background: rgba(255,255,255,.04); flex-shrink: 0; }

    /* Right panel */
    .right {
      flex: 1.05;
      background: var(--card-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 44px 40px;
      animation: fadeUp .7s .08s cubic-bezier(.22,1,.36,1) both;
    }

    .form-box { width: 100%; max-width: 320px; }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--text-dark);
      text-align: center;
      letter-spacing: -.3px;
      margin-bottom: 32px;
    }

    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #c2d0e0;
      letter-spacing: .1px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1.5px solid transparent;
      border-radius: 10px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: #1e6fc5;
      box-shadow: 0 0 0 3px rgba(30,111,197,.18);
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-light);
      background: transparent;
      border: none;
      outline: none;
      border-radius: 10px;
    }

    input::placeholder { color: #aab8c8; }

    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #8fa3be;
      padding: 0 11px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      border-radius: 0 10px 10px 0;
      transition: color .2s;
    }
    .eye-btn:hover { color: #4a6880; }

    .submit-btn {
      margin-top: 8px;
      width: 100%;
      padding: 13px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #e8edf5;
      background: #162d4a;
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: .2px;
      transition: background .2s, transform .15s, box-shadow .2s;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .submit-btn:hover {
      background: #1e3d60;
      box-shadow: 0 4px 18px rgba(30,111,197,.28);
      transform: translateY(-1px);
    }

    .submit-btn:active { transform: translateY(0); }

    .submit-btn.loading { opacity: .7; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.25);
      border-top-color: #e8edf5;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      font-size: 12.5px;
      color: #ff6b6b;
      background: rgba(255,107,107,.1);
      border: 1px solid rgba(255,107,107,.2);
      border-radius: 8px;
      padding: 9px 13px;
      margin-bottom: 4px;
      display: none;
    }

    .footer {
      margin-top: 20px;
      font-size: 11.5px;
      color: #3a5070;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp .7s .45s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 580px) {
      .card { flex-direction: column; border-radius: 16px; }
      .divider { width: 100%; height: 1px; }
      .right { padding: 28px 24px 36px; }
      .left  { padding: 30px 24px 22px; gap: 16px; }
      h1 { font-size: 22px; margin-bottom: 22px; }
    }
  </style>
</head>

            <input type="password" id="password" placeholder="Ingresa tu contraseña" value="12345678" autocomplete="current-password" />

              <svg id="eyeOpen" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <script>
    // Toggle password visibility
    const pwd = document.getElementById('password')
    const eyeOpen = document.getElementById('eyeOpen')
    const eyeClosed = document.getElementById('eyeClosed')
    document.getElementById('togglePwd').addEventListener('click', () => {
      const show = pwd.type === 'password'
      pwd.type = show ? 'text' : 'password'
      eyeOpen.style.display = show ? 'none' : 'block'
      eyeClosed.style.display = show ? 'block' : 'none'
    })

    // Submit with loading state
    const btn = document.getElementById('submitBtn')
    const spinner = document.getElementById('spinner')
    const btnText = document.getElementById('btnText')
    const errorMsg = document.getElementById('errorMsg')

    btn.addEventListener('click', async () => {
      const user = document.getElementById('username').value.trim()
      const pass = document.getElementById('password').value.trim()

      errorMsg.style.display = 'none'

      if (!user || !pass) {
        errorMsg.textContent = 'Por favor completa todos los campos.'
        errorMsg.style.display = 'block'
        return
      }

      // Loading state
      btn.classList.add('loading')
      btn.disabled = true
      btnText.style.display = 'none'
      spinner.style.display = 'block'

      await new Promise(r => setTimeout(r, 1400))

      // Reset (replace with real auth)
      btn.classList.remove('loading')
      btn.disabled = false
      btnText.style.display = 'block'
      spinner.style.display = 'none'
    })
  </script>
